name = "rwmod-api"
main = "worker-v2.js"
compatibility_date = "2026-06-07"

[assets]
directory = "../../web/rwmod-frontier"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

[[d1_databases]]
binding = "DB"
database_name = "atc-database"
database_id = "7d266a58-6690-45c5-a6f7-48eccf9c41e4"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "rimworld-translation-hub"

# Reserved for RWMod encyclopedia public media. The current Worker does not
# write to this bucket yet; bind it now so the deployed shape matches the
# planned production topology.
[[r2_buckets]]
binding = "RWMOD_ASSETS"
bucket_name = "rwmod-assets"
